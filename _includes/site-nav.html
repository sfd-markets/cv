<nav class="site-nav" aria-label="Main">
  {% for item in site.navigation %}
    <a href="{{ item.url | relative_url }}"
       {% if item.url == '/' %}
         {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}
       {% elsif page.url contains item.url %}
         class="active"
       {% endif %}>
      {{ item.title }}
    </a>
  {% endfor %}
</nav>
